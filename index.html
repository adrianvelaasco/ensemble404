<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensemble 404 - Under Construction</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #333333;
            --hover-color: #f0f0f0;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 200;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .construction-text {
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 4rem;
            opacity: 0.5;
            animation: pulse 3s infinite ease-in-out;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Ambient background decoration */
        .decor {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            mix-blend-mode: screen;
        }

        .c1 { width: 600px; height: 600px; top: -100px; right: -100px; }
        .c2 { width: 400px; height: 400px; bottom: -50px; left: -100px; }
    </style>
</head>
<body>
    <div class="decor">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="container">
        <p class="construction-text">Website Under Construction</p>
        <h1>ENSEMBLE 404</h1>
        <a href="/listeningnotfound" class="cta-button">Listening Not Found</a>
    </div>
</body>
</html>
